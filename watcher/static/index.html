<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashi Shop</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --c-primary:#6366f1;--c-primary-dark:#4f46e5;--c-secondary:#8b5cf6;
    --c-success:#22c55e;--c-danger:#ef4444;--c-warning:#f59e0b;
    --c-dark:#0f172a;--c-gray:#64748b;--c-light:#f1f5f9;--c-white:#fff;
    --c-accent:#06b6d4;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       background:var(--c-light);color:var(--c-dark);min-height:100vh}
  a{text-decoration:none;color:inherit}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit}

  /* NAV */
  #nav{background:var(--c-white);height:64px;display:flex;justify-content:space-between;
       align-items:center;padding:0 2rem;box-shadow:0 1px 3px rgba(0,0,0,.1);
       position:sticky;top:0;z-index:100}
  #nav-brand{display:flex;align-items:center;gap:.75rem;cursor:pointer}
  #nav-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
            justify-content:center;font-size:1.5rem;
            background:linear-gradient(135deg,var(--c-primary),var(--c-secondary))}
  #nav-title{font-size:1.25rem;font-weight:800;letter-spacing:-.025em}
  #nav-sub{font-size:.75rem;color:var(--c-gray);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  #nav-actions{display:flex;align-items:center;gap:1rem}
  .user-chip{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;
             border-radius:20px;border:1px solid}
  .user-chip.seller{background:#e0e7ff;border-color:#c7d2fe}
  .user-chip.admin{background:#fef3c7;border-color:#fbbf24}
  .role-badge{font-size:.65rem;font-weight:700;text-transform:uppercase;
              padding:.125rem .5rem;border-radius:10px;color:#fff}
  .role-badge.seller{background:var(--c-primary)}
  .role-badge.admin{background:#f59e0b;color:#92400e}
  .nav-link{color:var(--c-gray);font-weight:600;font-size:.9rem;padding:.5rem 1rem;
            border-radius:8px;border:none;background:transparent;transition:all .2s}
  .nav-link:hover{background:var(--c-light);color:var(--c-dark)}

  /* BUTTONS */
  .btn{padding:.6rem 1.5rem;border-radius:10px;font-weight:700;font-size:.95rem;
       border:none;transition:all .2s}
  .btn-primary{background:linear-gradient(135deg,var(--c-primary),var(--c-secondary));
               color:#fff;box-shadow:0 4px 6px -1px rgba(99,102,241,.3)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 15px -3px rgba(99,102,241,.4)}
  .btn-primary:disabled{background:#cbd5e1;box-shadow:none;transform:none;cursor:not-allowed}
  .btn-outline{background:transparent;border:1.5px solid var(--c-gray);color:var(--c-gray)}
  .btn-outline:hover{background:var(--c-danger);border-color:var(--c-danger);color:#fff}
  .btn-success{background:#27ae60;color:#fff;border:none}
  .btn-danger{background:var(--c-danger);color:#fff;border:none}
  .btn-sm{padding:.5rem .875rem;font-size:.875rem;border-radius:8px}
  .btn-ghost{background:transparent;border:none;color:var(--c-gray);font-weight:600;
             width:100%;padding:.75rem;border-radius:10px;font-size:.95rem}
  .btn-ghost:hover{background:var(--c-light);color:var(--c-dark)}

  /* MAIN CONTENT */
  #main{max-width:1200px;margin:0 auto;padding:2rem}
  .page{display:none}
  .page.active{display:block}

  /* CARDS */
  .card{background:var(--c-white);border-radius:16px;
        box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06)}

  /* GRID */
  .grid{display:grid;gap:2rem}
  .grid-auto{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}

  /* FORMS */
  .form-group{margin-bottom:1.5rem}
  label{display:block;font-weight:700;font-size:.95rem;margin-bottom:.5rem}
  .input{width:100%;padding:.875rem 1rem;border:2px solid #e2e8f0;border-radius:10px;
         font-size:1rem;outline:none;transition:border-color .2s}
  .input:focus{border-color:var(--c-primary)}
  textarea.input{resize:vertical}
  select.input{background:var(--c-white);cursor:pointer}
  .input-icon{position:relative}
  .input-icon .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);
                    font-size:1.1rem;opacity:.5;pointer-events:none}
  .input-icon .input{padding-left:2.75rem}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);
                 backdrop-filter:blur(8px);display:flex;align-items:center;
                 justify-content:center;z-index:1000;animation:fadeIn .2s}
  .modal{background:var(--c-white);padding:2.5rem;border-radius:16px;width:100%;
         max-width:420px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);animation:slideUp .3s}
  .modal-header{text-align:center;margin-bottom:2rem}
  .modal-icon{width:56px;height:56px;border-radius:14px;margin:0 auto 1rem;
              display:flex;align-items:center;justify-content:center;font-size:1.75rem;
              background:linear-gradient(135deg,var(--c-primary),var(--c-secondary))}
  .modal-title{font-size:1.5rem;font-weight:800}
  .modal-sub{color:var(--c-gray);font-size:.95rem;margin-top:.5rem}

  /* ALERT */
  .alert{padding:.875rem 1rem;border-radius:10px;margin-bottom:1.5rem;
         font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
  .alert-error{background:#fef2f2;color:var(--c-danger);border:1px solid #fecaca}
  .alert-success{background:#f0fdf4;color:#15803d;border:1px solid #86efac}

  /* HERO */
  .hero{position:relative;overflow:hidden;
        background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4c1d95 100%);
        color:#fff;padding:4rem 2rem;border-radius:16px;margin-bottom:2.5rem;
        min-height:280px;display:flex;flex-direction:column;justify-content:center;
        align-items:center;text-align:center;box-shadow:0 25px 50px -12px rgba(76,29,149,.4)}
  .hero-float{position:absolute;animation:float 4s ease-in-out infinite}
  .hero h1{font-size:3.5rem;font-weight:900;letter-spacing:-.02em;
           text-shadow:0 4px 20px rgba(0,0,0,.3);position:relative;z-index:2}
  .hero p{font-size:1.35rem;opacity:.95;position:relative;z-index:2}

  /* LISTING CARD */
  .listing-card{border-radius:16px;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1);cursor:pointer}
  .listing-card:hover{transform:translateY(-8px);box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
  .listing-img{height:240px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
               display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .listing-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
  .listing-card:hover .listing-img img{transform:scale(1.05)}
  .listing-body{padding:1.5rem}
  .listing-title{font-size:1.2rem;font-weight:700;margin-bottom:.5rem;line-height:1.3}
  .listing-desc{color:var(--c-gray);font-size:.95rem;line-height:1.5;margin-bottom:1.25rem;
                overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .listing-footer{display:flex;justify-content:space-between;align-items:center}
  .listing-price{font-size:1.5rem;font-weight:800;color:var(--c-primary);letter-spacing:-.02em}
  .badge{display:inline-block;padding:.25rem .6rem;border-radius:6px;font-size:.75rem;
         font-weight:600;background:#eef2ff;color:var(--c-primary);margin-bottom:.75rem}
  .badge-new{position:absolute;top:12px;left:12px;background:var(--c-accent);color:#fff;
             padding:.35rem .85rem;border-radius:20px;font-size:.75rem;font-weight:700;
             text-transform:uppercase;letter-spacing:.05em;z-index:10}

  /* REVIEW CARD */
  .ai-box{background:#f8f9fa;padding:.75rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem}
  .ai-approve{color:#27ae60}
  .ai-reject{color:var(--c-danger)}
  .ai-review{color:var(--c-warning)}
  .priority-badge{padding:.25rem .75rem;border-radius:20px;font-size:.75rem;font-weight:700;
                  text-transform:uppercase}
  .priority-high{background:#ffebee;color:#c62828}
  .priority-medium{background:#fff3e0;color:#ef6c00}
  .priority-low{background:#e8f5e9;color:#2e7d32}
  .action-row{display:flex;gap:.75rem;margin-bottom:.75rem}
  .action-row2{display:flex;gap:.5rem}

  /* STATS */
  .stat-card{background:var(--c-white);padding:1.5rem;border-radius:8px;
             box-shadow:0 2px 4px rgba(0,0,0,.1);text-align:center}
  .stat-value{font-size:2rem;font-weight:700}
  .stat-label{margin-top:.5rem;color:var(--c-gray)}

  /* UPLOAD */
  .upload-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:2rem;text-align:center;
               transition:all .2s;cursor:pointer}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--c-primary);background:#eef2ff}
  .upload-zone .icon{font-size:2.5rem;margin-bottom:.75rem}
  .upload-zone p{color:var(--c-gray);font-size:.95rem;margin-bottom:1rem}

  /* STATUS BADGES */
  .status-approved{background:#f0fdf4;color:var(--c-success)}
  .status-rejected{background:#fef2f2;color:var(--c-danger)}
  .status-pending{background:#fffbeb;color:var(--c-warning)}
  .status-badge{display:inline-block;padding:.35rem .75rem;border-radius:20px;
                font-size:.8rem;font-weight:700;margin-bottom:.75rem}

  /* EMPTY STATE */
  .empty{text-align:center;padding:5rem 2rem}
  .empty .icon{font-size:4rem;margin-bottom:1.5rem}
  .empty h2{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
  .empty p{color:var(--c-gray);font-size:1.1rem;max-width:400px;margin:0 auto}

  /* SPINNER */
  .spinner{width:48px;height:48px;border:4px solid var(--c-light);
           border-top:4px solid var(--c-primary);border-radius:50%;
           margin:0 auto 1rem;animation:spin 1s linear infinite}
  .loading{text-align:center;padding:4rem}
  .sm-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
              border-top:2px solid #fff;border-radius:50%;
              display:inline-block;animation:spin 1s linear infinite;vertical-align:middle}

  /* FORM PAGE */
  .form-page{max-width:640px;margin:0 auto}
  .page-header{margin-bottom:2rem}
  .page-header h2{font-size:1.75rem;font-weight:800;margin-bottom:.5rem}
  .page-header p{color:var(--c-gray);font-size:1rem}

  /* SUCCESS */
  .success-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);padding:2.5rem;
               border-radius:16px;text-align:center;border:2px solid #86efac}
  .success-box .icon{font-size:4rem;margin-bottom:1rem}
  .success-box h3{color:#15803d;font-size:1.5rem;font-weight:800;margin-bottom:.75rem}
  .success-box p{color:#166534;font-size:1.05rem;margin-bottom:1.5rem}

  /* SECTION HEADER */
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
  .section-header h2{font-size:1.5rem;font-weight:700}

  /* ANIMATIONS */
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}
  @keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(-5deg)}}
  @keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:.9rem}
  .tbl th{padding:.75rem 1rem;text-align:left;font-weight:700;font-size:.78rem;
          text-transform:uppercase;letter-spacing:.05em;color:var(--c-gray);
          border-bottom:2px solid var(--c-light);background:var(--c-white);white-space:nowrap}
  .tbl td{padding:.7rem 1rem;border-bottom:1px solid var(--c-light);vertical-align:middle}
  .tbl tbody tr:hover{background:#f8fafc}
  .tbl tbody tr:last-child td{border-bottom:none}

  /* RESPONSIVE */
  @media(max-width:640px){
    #main{padding:1rem}
    .hero h1{font-size:2.5rem}
    .hero-float{display:none}
  }

  /* TABS */
  .tab-bar{display:flex;gap:.25rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .tab-btn{padding:.5rem 1rem;border-radius:8px;border:none;background:var(--c-light);
           color:var(--c-gray);font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--c-primary);color:#fff}
  /* BADGE */
  .age-badge{display:inline-block;padding:.2rem .5rem;border-radius:12px;font-size:.75rem;font-weight:700}
  .age-ok{background:#f0fdf4;color:#15803d}
  .age-warn{background:#fffbeb;color:#92400e}
  .age-crit{background:#fef2f2;color:#b91c1c}
  /* INSIGHT CARD */
  .insight-card{background:var(--c-white);border-radius:12px;padding:1.5rem;
                box-shadow:0 2px 4px rgba(0,0,0,.08)}
  .insight-val{font-size:2.5rem;font-weight:800;line-height:1}
  .insight-label{color:var(--c-gray);font-size:.9rem;margin-top:.5rem}
  /* MODAL BACKDROP */
  .admin-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);
               display:flex;align-items:center;justify-content:center;z-index:2000}
  .admin-modal-box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:560px;
                   max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
  /* HEALTH DOT */
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:.4rem}
  .dot-ok{background:var(--c-success)}.dot-warn{background:var(--c-warning)}.dot-err{background:var(--c-danger)}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div id="nav-brand" onclick="navigate('/')">
    <div id="nav-logo">&#x1f3ea;</div>
    <div>
      <div id="nav-title">Cashi Shop</div>
      <div id="nav-sub">Marketplace</div>
    </div>
  </div>
  <div id="nav-actions">
    <span id="nav-user-area"></span>
    <button id="nav-login-btn" class="btn btn-primary" onclick="showLoginModal()">&#x1f510; Login</button>
    <button id="nav-logout-btn" class="btn btn-outline" style="display:none" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">

  <!-- STOREFRONT PAGE -->
  <div id="page-home" class="page active">
    <div class="hero">
      <div class="hero-float" style="top:15%;left:10%;font-size:3rem;animation-duration:4s">&#x1f6cd;&#xfe0f;</div>
      <div class="hero-float" style="top:20%;right:12%;font-size:2.5rem;animation:float2 5s ease-in-out infinite">&#x1f6d2;</div>
      <div class="hero-float" style="bottom:20%;left:15%;font-size:2rem;animation:pulse 3s ease-in-out infinite">&#x1f4b0;</div>
      <div class="hero-float" style="bottom:25%;right:18%;font-size:1.8rem;animation:pulse 3.5s ease-in-out infinite .5s">&#x1f48e;</div>
      <div class="hero-float" style="top:40%;left:5%;font-size:1.2rem;animation:pulse 2s ease-in-out infinite">&#x2728;</div>
      <div class="hero-float" style="top:35%;right:8%;font-size:1.5rem;animation:pulse 2.5s ease-in-out infinite 1s">&#x2b50;</div>
      <h1>Cashi Shop</h1>
      <p>Buy &amp; Sell</p>
    </div>
    <div id="storefront-content"></div>
  </div>

  <!-- SUBMIT PAGE -->
  <div id="page-submit" class="page">
    <div class="form-page">
      <div class="page-header">
        <h2>Create Listing</h2>
        <p>Fill in the details below to list your item for sale.</p>
      </div>
      <div id="submit-content"></div>
    </div>
  </div>

  <!-- REVIEW PAGE -->
  <div id="page-review" class="page">
    <div id="review-content"></div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="page-dashboard" class="page">
    <div class="page-header">
      <h2>My Listings</h2>
      <p>Track your submissions and manage your listings.</p>
    </div>
    <div id="dashboard-content"></div>
  </div>

  <!-- SELLERS PAGE (admin only) -->
  <div id="page-sellers" class="page">
    <div id="sellers-content"></div>
  </div>

  <!-- AUDIT LOG PAGE (admin only) -->
  <div id="page-audit" class="page">
    <div id="audit-content"></div>
  </div>

  <!-- ALL LISTINGS PAGE (admin only) -->
  <div id="page-all-listings" class="page"><div id="all-listings-content"></div></div>

  <!-- USER MANAGEMENT PAGE (admin only) -->
  <div id="page-users" class="page"><div id="users-content"></div></div>

  <!-- SYSTEM PAGE (admin only) -->
  <div id="page-system" class="page"><div id="system-content"></div></div>

  <!-- INSIGHTS PAGE (admin only) -->
  <div id="page-insights" class="page"><div id="insights-content"></div></div>

</div>

<!-- LOGIN MODAL (hidden by default) -->
<div id="login-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">&#x1f510;</div>
      <div class="modal-title">Welcome Back</div>
      <div class="modal-sub">Login to manage your listings</div>
    </div>
    <div id="login-error"></div>
    <form id="login-form" onsubmit="submitLogin(event)">
      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-icon">
          <span class="icon">&#x1f464;</span>
          <input id="login-username" class="input" type="text" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-icon">
          <span class="icon">&#x1f512;</span>
          <input id="login-password" class="input" type="password" required autocomplete="current-password" placeholder="Enter password">
        </div>
      </div>
      <button type="submit" id="login-submit" class="btn btn-primary" style="width:100%;padding:1rem">Login</button>
    </form>
    <button class="btn-ghost" onclick="hideLoginModal()" style="margin-top:1rem">Cancel</button>
  </div>
</div>

<script>
'use strict';

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let currentUser = null;
let reviewInterval = null;
let submitSuccess = false;

// ---------------------------------------------------------------------------
// Routing
// ---------------------------------------------------------------------------
function navigate(path) {
  window.location.hash = path;
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => { render(); loadStorefront(); });

function render() {
  const hash = window.location.hash.replace('#', '') || '/';
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  if (reviewInterval) { clearInterval(reviewInterval); reviewInterval = null; }

  if (hash === '/' || hash === '') {
    document.getElementById('page-home').classList.add('active');
    loadStorefront();
  } else if (hash === '/submit') {
    document.getElementById('page-submit').classList.add('active');
    renderSubmitPage();
  } else if (hash === '/review') {
    document.getElementById('page-review').classList.add('active');
    loadReviewQueue();
    reviewInterval = setInterval(loadReviewQueue, 10000);
  } else if (hash === '/dashboard') {
    document.getElementById('page-dashboard').classList.add('active');
    loadDashboard();
  } else if (hash === '/sellers') {
    document.getElementById('page-sellers').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadSellers();
  } else if (hash === '/audit') {
    document.getElementById('page-audit').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadAudit();
  } else if (hash === '/all-listings') {
    document.getElementById('page-all-listings').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadAllListings();
  } else if (hash === '/users') {
    document.getElementById('page-users').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadUsers();
  } else if (hash === '/system') {
    document.getElementById('page-system').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadSystem();
  } else if (hash === '/insights') {
    document.getElementById('page-insights').classList.add('active');
    if (!currentUser || !currentUser.is_admin) { navigate('/'); return; }
    loadInsights();
  } else {
    navigate('/');
  }
}

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
function showLoginModal() {
  document.getElementById('login-modal').style.display = 'flex';
  document.getElementById('login-error').innerHTML = '';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  setTimeout(() => document.getElementById('login-username').focus(), 50);
}

function hideLoginModal() {
  document.getElementById('login-modal').style.display = 'none';
}

async function submitLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-submit');
  btn.disabled = true;
  btn.innerHTML = '<span class="sm-spinner"></span> Logging in...';
  document.getElementById('login-error').innerHTML = '';

  const fd = new FormData();
  fd.append('username', document.getElementById('login-username').value);
  fd.append('password', document.getElementById('login-password').value);

  try {
    const res = await fetch('/api/login', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Invalid username or password');
    currentUser = { id: data.id, username: data.username, is_admin: data.is_admin, is_banned: data.is_banned };
    hideLoginModal();
    updateNavUser();
    if (currentUser.is_admin) navigate('/review');
    else navigate('/submit');
  } catch (err) {
    document.getElementById('login-error').innerHTML =
      `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

function logout() {
  currentUser = null;
  updateNavUser();
  navigate('/');
}

function updateNavUser() {
  const area = document.getElementById('nav-user-area');
  const loginBtn = document.getElementById('nav-login-btn');
  const logoutBtn = document.getElementById('nav-logout-btn');

let selectedFiles = [];

function renderSubmitPage() {
  const el = document.getElementById('submit-content');
  if (!currentUser) {

      <div class="icon">&#x1f3ea;</div>

  }

        <input class="input" type="text" name="title" required placeholder="What are you selling?">
      </div>
      <div class="form-group">
        <label>&#x1f3f7;&#xfe0f; Category</label>
        <select class="input" name="category" required>
          <option value="">Select a category...</option>
          <option>Electronics</option><option>Clothing</option>
          <option>Home</option><option>Vehicles</option>
          <option>Services</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>&#x1f4c4; Description</label>
        <textarea class="input" name="description" required rows="5" placeholder="Describe your item in detail..."></textarea>
      </div>
      <div class="form-group">
        <label>&#x1f4b0; Price ($)</label>
        <input class="input" type="number" name="price" step="0.01" min="0" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label>&#x1f4f8; Images</label>
        <div class="upload-zone" id="upload-zone"
          ondragover="dropOver(event)" ondragleave="dropLeave(event)" ondrop="dropFiles(event)"
          onclick="document.getElementById('file-input').click()">

          <p>Drag &amp; drop JPG, JPEG, or PNG images here or click to browse</p>
          <span style="display:inline-block;padding:.625rem 1.25rem;background:var(--c-light);
                       color:var(--c-dark);border-radius:8px;font-size:.9rem;font-weight:600">Choose Files</span>
          <input type="file" id="file-input" accept=".jpg,.jpeg,.png" multiple style="display:none"
            onchange="handleFileInput(this.files)">
        </div>
        <div id="file-status" style="margin-top:.75rem"></div>
      </div>
      <div style="display:flex;gap:1rem">
        <button type="submit" id="submit-btn" class="btn btn-primary" style="flex:1;padding:1rem">&#x1f680; Submit Listing</button>
        <button type="button" class="btn btn-outline" style="padding:1rem 1.75rem" onclick="logout()">&#x1f6aa; Logout</button>
      </div>
    </form>`;
  selectedFiles = [];
}

function resetSubmit() { submitSuccess = false; renderSubmitPage(); }

const ALLOWED = ['image/jpeg', 'image/png'];
const ALLOWED_EXT = ['.jpg', '.jpeg', '.png'];

function filterFiles(files) {
  const valid = [], rejected = [];
  for (const f of files) {
    const ext = f.name.toLowerCase().slice(f.name.lastIndexOf('.'));
    (ALLOWED.includes(f.type) || ALLOWED_EXT.includes(ext)) ? valid.push(f) : rejected.push(f.name);
  }
  return { valid, rejected };
}

function handleFileInput(files) {
  const { valid, rejected } = filterFiles(Array.from(files));
  selectedFiles = valid;
  const status = document.getElementById('file-status');
  if (rejected.length) {
    status.innerHTML = `<div class="alert alert-error">Rejected: ${rejected.map(esc).join(', ')}. Only JPG, JPEG, PNG allowed.</div>`;
  }
  if (valid.length) {
    status.innerHTML = `<p style="color:var(--c-success);font-weight:600">&#x2705; ${valid.length} image(s) selected</p>`;
  }
}

function dropOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag'); }
function dropLeave(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); }
function dropFiles(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  handleFileInput(e.dataTransfer.files);
}

async function submitListing(e) {
  e.preventDefault();
  const errEl = document.getElementById('submit-error');
  errEl.innerHTML = '';

  if (!selectedFiles.length) {
    errEl.innerHTML = '<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> Please select at least one image (JPG, JPEG, or PNG)</div>';
    return;
  }

  const form = e.target;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sm-spinner"></span> Submitting...';

  const fd = new FormData();
  fd.append('user_id', currentUser.username);
  fd.append('title', form.title.value);
  fd.append('category', form.category.value);
  fd.append('description', form.description.value);
  fd.append('price', form.price.value);
  selectedFiles.forEach(f => fd.append('images', f));

  try {
    const res = await fetch('/api/submit', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Submission failed');
    submitSuccess = true;
    renderSubmitPage();
  } catch (err) {
    errEl.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
    btn.disabled = false;
    btn.innerHTML = '&#x1f680; Submit Listing';
  }
}

async function loadReviewQueue() {
  const el = document.getElementById('review-content');

  if (!currentUser) {
    el.innerHTML = `<div class="card empty"><h2>Access Denied</h2><p>Please login as a moderator.</p></div>`;
    return;
  }
  if (!currentUser.is_admin) {
    el.innerHTML = `<div class="card empty"><h2>Access Denied</h2><p>This area is for moderators only.</p></div>`;
    return;
  }

  if (!el.innerHTML) {
    el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--c-gray)">Loading queue...</p></div>';
  }

  try {
    const [qRes, sRes] = await Promise.all([fetch('/api/review-queue'), fetch('/api/stats')]);
    const queue = qRes.ok ? await qRes.json() : { items: [] };
    const stats = sRes.ok ? await sRes.json() : null;
    renderReviewQueue(queue.items || [], stats);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

function renderReviewQueue(items, stats) {
  const el = document.getElementById('review-content');

  const statsHtml = stats ? `
    <div class="grid grid-3" style="margin-bottom:2rem">
      ${statCard('Total Moderated', stats.total_moderated, '#4a90e2')}
      ${statCard('Auto Approved', stats.auto_approved, '#27ae60')}
      ${statCard('Auto Rejected', stats.auto_rejected, 'var(--c-danger)')}
      ${statCard('Sent to Review', stats.sent_to_review, 'var(--c-warning)')}
      ${statCard('Queue Depth', stats.queue_depth, '#9b59b6')}
      ${statCard('Avg Latency', (stats.avg_latency_seconds || 0) + 's', '#34495e')}
    </div>` : '';

  const queueHtml = items.length === 0
    ? `<div class="card" style="text-align:center;padding:3rem"><p style="color:#27ae60;font-size:1.2rem">No items in review queue. All caught up!</p></div>`
    : `<div class="grid grid-auto">${items.map(reviewCard).join('')}</div>`;

  el.innerHTML = `
    <div class="section-header">
      <h2>Moderation Queue (${items.length} pending)</h2>
      <button class="btn btn-primary btn-sm" onclick="loadReviewQueue()">Refresh</button>
    </div>
    ${statsHtml}
    ${queueHtml}`;
}

function statCard(title, value, color) {
  return `<div class="stat-card"><div class="stat-value" style="color:${color}">${esc(String(value))}</div><div class="stat-label">${esc(title)}</div></div>`;
}

function reviewCard(item) {
  const p = item.priority || 'medium';
  const dec = item.ai_decision || 'REVIEW';
  const decClass = dec === 'APPROVE' ? 'ai-approve' : dec === 'REJECT' ? 'ai-reject' : 'ai-review';
  const conf = item.ai_confidence != null ? `(${(item.ai_confidence * 100).toFixed(0)}%)` : '';
  const reasons = (item.ai_reasons || []).join(', ') || 'No issues flagged';
  return `
    <div class="card" style="border-radius:16px;overflow:hidden">
      <div style="height:200px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden">
        ${item.image_url ? `<img src="${esc(item.image_url)}" alt="${esc(item.title)}" style="width:100%;height:100%;object-fit:cover">` : '<span style="color:#ccc;font-size:3rem">No Image</span>'}
      </div>
      <div style="padding:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <span class="badge">${esc(item.category || 'Other')}</span>
          <span style="font-size:.8rem;color:#999">by ${esc(item.submitter || 'unknown')}</span>
        </div>
        <h3 style="margin:0 0 .5rem;font-size:1.1rem;color:#333">${esc(item.title)}</h3>
        <p style="color:#666;font-size:.9rem;line-height:1.4;margin:0 0 .75rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(item.description)}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <span style="font-size:1.25rem;font-weight:700;color:var(--c-primary)">$${esc(String(item.price))}</span>
          <span class="priority-badge priority-${p}">${p} Priority</span>
        </div>
        <div class="ai-box">
          <p style="margin:0 0 .25rem;font-weight:500">AI: <span class="${decClass}" style="font-weight:700">${dec}</span> <span style="color:#666">${conf}</span></p>
          <p style="margin:0;color:#666;font-size:.8rem">${esc(reasons)}</p>
        </div>
        <div class="action-row">
          <button class="btn btn-success btn-sm" style="flex:1" onclick="reviewAction('${esc(item.listing_id)}','publish')">&#x2705; Publish</button>
          <button class="btn btn-danger btn-sm" style="flex:1" onclick="reviewAction('${esc(item.listing_id)}','ban')">&#x274c; Ban</button>
        </div>
        <div class="action-row2">
          <button class="btn btn-sm" style="flex:1;background:#fee2e2;color:#dc2626;border:2px solid #fca5a5" onclick="deleteListing('${esc(item.listing_id)}','${esc(item.title)}')">&#x1f5d1;&#xfe0f; Delete</button>
          <button class="btn btn-sm" style="flex:1;background:#fef3c7;color:#92400e;border:2px solid #fbbf24" onclick="blockUser('${esc(item.submitter)}')">&#x1f6ab; Block User</button>
        </div>
      </div>
    </div>`;
}

async function reviewAction(listingId, action) {
  const fd = new FormData();
  fd.append('action', action);
  fd.append('moderator', currentUser.username);
  try {
    const res = await fetch(`/api/review/${listingId}`, { method: 'POST', body: fd });
    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    await loadReviewQueue();
  } catch (err) { alert(`Error: ${err.message}`); }
}

async function blockUser(username) {
  if (!confirm(`Block user "${username}"? They will no longer be able to submit listings.`)) return;
  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  try {
    const res = await fetch(`/api/ban-user/${encodeURIComponent(username)}`, { method: 'POST', body: fd });
    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    alert(`User "${username}" has been blocked.`);
    await loadReviewQueue();
  } catch (err) { alert(`Error: ${err.message}`); }
}

async function deleteListing(listingId, title) {
  if (!confirm(`Delete listing "${title}" permanently? This cannot be undone.`)) return;
  const fd = new FormData();
  fd.append('username', currentUser.username);
  try {
    const res = await fetch(`/api/listings/${listingId}`, { method: 'DELETE', body: fd });
    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    await loadReviewQueue();
  } catch (err) { alert(`Error: ${err.message}`); }
}

let editingId = null;

async function loadDashboard() {
  const el = document.getElementById('dashboard-content');
  if (!currentUser) {
    el.innerHTML = `<div class="card empty"><div class="icon">&#x1f464;</div><h2>My Listings</h2><p>Please login to view your listings.</p></div>`;

  }
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--c-gray)">Loading...</p></div>';
  try {
    const res = await fetch(`/api/my-listings?user_id=${encodeURIComponent(currentUser.username)}`);
    if (!res.ok) throw new Error('Failed to load dashboard');
    const data = await res.json();
    renderDashboard(data.listings || [], data.is_banned || false);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

function renderDashboard(listings, isBanned) {
  const el = document.getElementById('dashboard-content');
  const bannedBanner = isBanned ? `
    <div style="background:#fef2f2;border:2px solid #fecaca;border-radius:12px;padding:1.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:1rem">
      <span style="font-size:2rem">&#x1f6ab;</span>
      <div>
        <p style="margin:0;font-weight:700;color:var(--c-danger);font-size:1.1rem">Account Suspended</p>
        <p style="margin:.25rem 0 0;color:#991b1b;font-size:.9rem">Your account has been blocked by a moderator. You cannot submit new listings or edit existing ones.</p>
      </div>
    </div>` : '';

  if (listings.length === 0) {
    el.innerHTML = bannedBanner + `<div class="card empty"><div class="icon">&#x1f4ed;</div><p style="color:var(--c-gray);font-size:1.1rem">No listings yet. Submit your first item!</p></div>`;
    return;
  }

  el.innerHTML = bannedBanner + `<div class="grid grid-auto">${listings.map(item => dashCard(item, isBanned)).join('')}</div>`;
  editingId = null;
}

function dashCard(item, isBanned) {
  const isPublished = item.status === 'published' && item.is_published;
  const isRejected = item.status === 'rejected';
  const statusCls = isPublished ? 'status-approved' : isRejected ? 'status-rejected' : 'status-pending';
  const statusTxt = isPublished ? 'Approved &#x2705;' : isRejected ? 'Rejected &#x274c;' : 'Pending &#x23f3;';

  const rejectedAI = isRejected && item.ai_reasons && item.ai_reasons[0] !== 'none'
    ? `<div style="background:#fef2f2;padding:.75rem;border-radius:8px;margin-bottom:.75rem;font-size:.85rem"><p style="margin:0;color:#991b1b;font-weight:600">&#x26a0;&#xfe0f; ${esc((item.ai_reasons || []).join(', '))}</p></div>` : '';

  const actions = isRejected && !isBanned
    ? `<button class="btn btn-sm" style="background:var(--c-warning);color:#fff;border:none;flex:1;min-width:120px;font-weight:700" onclick="startEdit('${item.id}','${esc(item.title)}','${esc(item.category||'Other')}','${esc(item.description)}','${item.price}')">&#x1f4dd; Edit &amp; Resubmit</button>`
    : isRejected && isBanned
      ? `<button disabled class="btn btn-sm" style="background:#e5e7eb;color:#9ca3af;border:none;flex:1;min-width:120px;cursor:not-allowed">&#x1f512; Blocked</button>` : '';

  return `
    <div class="card" style="border-radius:16px;overflow:hidden" id="dash-card-${item.id}">
      <div style="height:200px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);display:flex;align-items:center;justify-content:center;overflow:hidden">
        ${item.image_url ? `<img src="${esc(item.image_url)}" alt="${esc(item.title)}" style="width:100%;height:100%;object-fit:cover">` : '<span style="color:#ccc;font-size:3rem">&#x1f4f7;</span>'}
      </div>
      <div style="padding:1.25rem">
        <span class="status-badge ${statusCls}">${statusTxt}</span>
        <span class="badge" style="margin-left:.5rem">${esc(item.category || 'Other')}</span>
        <h3 style="margin:.5rem 0;font-size:1.1rem;font-weight:700;color:var(--c-dark)">${esc(item.title)}</h3>
        <p style="color:var(--c-gray);font-size:.9rem;line-height:1.4;margin:0 0 .75rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(item.description)}</p>
        <p style="font-size:1.25rem;font-weight:800;color:var(--c-primary);margin:0 0 .75rem">$${Number(item.price).toFixed(2)}</p>
        ${rejectedAI}
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          ${actions}
          <button class="btn btn-danger btn-sm" style="flex:1;min-width:80px;font-weight:700" onclick="deleteMyListing('${item.id}')">&#x1f5d1;&#xfe0f; Delete</button>
        </div>
      </div>
    </div>`;
}

function startEdit(id, title, category, description, price) {
  const card = document.getElementById(`dash-card-${id}`);
  if (!card) return;
  editingId = id;
  const body = card.querySelector('div[style*="padding:1.25rem"]');
  body.innerHTML = `
    <div class="form-group"><label>Title</label><input class="input" id="edit-title" value="${esc(title)}"></div>
    <div class="form-group"><label>Category</label>
      <select class="input" id="edit-category">
        ${['Electronics','Clothing','Home','Vehicles','Services','Other'].map(c => `<option ${c===category?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Description</label><textarea class="input" id="edit-desc" rows="3">${esc(description)}</textarea></div>
    <div class="form-group"><label>Price</label><input class="input" type="number" step="0.01" id="edit-price" value="${price}"></div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-primary btn-sm" style="flex:1" onclick="saveEdit('${id}')">&#x1f4be; Save</button>
      <button class="btn btn-sm" style="flex:1;background:var(--c-light);color:var(--c-gray);border:none" onclick="loadDashboard()">Cancel</button>
    </div>`;
}

async function saveEdit(listingId) {
  const fd = new FormData();
  fd.append('user_id', currentUser.username);
  fd.append('title', document.getElementById('edit-title').value);
  fd.append('category', document.getElementById('edit-category').value);
  fd.append('description', document.getElementById('edit-desc').value);
  fd.append('price', document.getElementById('edit-price').value);
  try {
    const res = await fetch(`/api/listings/${listingId}`, { method: 'PUT', body: fd });
    if (!res.ok) throw new Error('Update failed');

async function loadAudit() {
  if (!currentUser || !currentUser.is_admin) return;
  const el = document.getElementById('audit-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--c-gray)">Loading audit log...</p></div>';
  try {
    const res = await fetch(`/api/audit?moderator=${encodeURIComponent(currentUser.username)}&limit=100`);

    renderAudit(data.entries || []);

    el.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;

function renderAudit(entries) {
  const el = document.getElementById('audit-content');
  if (!entries.length) {
    el.innerHTML = '<div class="card empty"><div class="icon">&#x1f4dc;</div><p>No audit log entries yet.</p></div>';
    return;
  }
  const actionColor = {published:'var(--c-success)',rejected:'var(--c-danger)',rollback:'var(--c-warning)',banned:'#7c3aed'};
  const rows = entries.map(e => `
    <tr>
      <td style="font-size:.8rem;color:var(--c-gray);white-space:nowrap">${fmtDateTime(e.created_at)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.title)}">${esc(e.title)}</td>
      <td style="font-size:.85rem">${esc(e.seller)}</td>
      <td><strong style="color:${actionColor[e.action]||'var(--c-dark)'}">${esc(e.action)}</strong></td>
      <td><span style="font-size:.78rem;opacity:.6;text-transform:uppercase">${esc(e.source)}</span></td>
      <td style="font-size:.85rem">${esc(e.performed_by)}</td>
      <td style="font-size:.8rem;color:var(--c-gray);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.notes)}">${esc(e.notes)}</td>
      <td>${e.action !== 'rollback'
        ? `<button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:none;white-space:nowrap" onclick="rollbackListing('${esc(e.listing_id)}','${esc(e.title)}')">&#x21ba; Rollback</button>`
        : '<span style="color:var(--c-gray);font-size:.8rem">--</span>'}</td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="section-header">
      <h2>Audit Log (${entries.length} recent)</h2>
      <button class="btn btn-primary btn-sm" onclick="loadAudit()">Refresh</button>
    </div>
    <div class="card" style="overflow:auto;padding:0">
      <table class="tbl">
        <thead><tr>
          <th>Time</th><th>Listing</th><th>Seller</th>
          <th>Decision</th><th>Source</th><th>By</th><th>Notes</th><th>Action</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function rollbackListing(listingId, title) {
  const reason = prompt(`Rollback decision for "${title}"?\nEnter reason (or leave blank):`, 'Decision contested');
  if (reason === null) return;
  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  if (reason.trim()) fd.append('notes', reason.trim());
  try {
    const res = await fetch(`/api/listings/${encodeURIComponent(listingId)}/rollback`, { method: 'POST', body: fd });
    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    alert(`Listing "${title}" has been sent back to the review queue.`);
    await loadAudit();
  } catch (err) { alert(`Error: ${err.message}`); }
}

let allListingsFilter = 'all';

async function loadAllListings() {
  if (!currentUser || !currentUser.is_admin) return;
  const el = document.getElementById('all-listings-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--c-gray)">Loading listings...</p></div>';
  try {
    const status = allListingsFilter === 'all' ? '' : allListingsFilter;
    const url = `/api/all-listings?moderator=${encodeURIComponent(currentUser.username)}${status ? '&status=' + encodeURIComponent(status) : ''}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Failed to load listings');
    const data = await res.json();
    renderAllListings(data.listings || [], allListingsFilter);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

function renderAllListings(listings, statusFilter) {
  const el = document.getElementById('all-listings-content');
  const filters = ['all', 'published', 'rejected', 'pending'];
  const tabBar = `<div class="tab-bar">${filters.map(f =>
    `<button class="tab-btn${statusFilter === f ? ' active' : ''}" onclick="allListingsFilter='${f}';loadAllListings()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
  ).join('')}</div>`;

  if (!listings.length) {
    el.innerHTML = `<div class="section-header"><h2>All Listings</h2><button class="btn btn-primary btn-sm" onclick="loadAllListings()">Refresh</button></div>
      ${tabBar}<div class="card empty"><p style="color:var(--c-gray)">No listings found.</p></div>`;
    return;
  }

  const rows = listings.map(item => {
    const statusCls = item.status === 'published' ? 'status-approved' : item.status === 'rejected' ? 'status-rejected' : 'status-pending';
    const conf = item.final_confidence != null ? `${(item.final_confidence * 100).toFixed(0)}%` : '--';
    const imgHtml = item.image_url
      ? `<img src="${esc(item.image_url)}" alt="${esc(item.title)}" style="width:50px;height:50px;object-fit:cover;border-radius:6px">`
      : '<span style="color:#ccc;font-size:1.5rem">&#x1f4f7;</span>';
    return `<tr>
      <td>${imgHtml}</td>
      <td style="max-width:180px"><strong title="${esc(item.title)}">${esc(item.title.length > 40 ? item.title.slice(0,40)+'...' : item.title)}</strong></td>
      <td>${esc(item.seller || 'unknown')}${item.seller_banned ? ' <span style="color:var(--c-danger);font-size:.75rem">(banned)</span>' : ''}</td>
      <td><span class="badge" style="margin:0">${esc(item.category || 'Other')}</span></td>
      <td><span class="status-badge ${statusCls}" style="margin:0;font-size:.75rem">${esc(item.status)}</span></td>
      <td style="font-size:.85rem">${item.final_decision ? esc(item.final_decision) : '--'}</td>
      <td style="font-size:.85rem">${conf}</td>
      <td style="font-size:.8rem;color:var(--c-gray)">${fmtDate(item.created_at)}</td>
      <td>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">
          <button class="btn btn-sm" style="background:#e0e7ff;color:var(--c-primary);border:none" onclick='showEditModal(${JSON.stringify({id:item.id,title:item.title,category:item.category,description:"",price:item.price})})'>Edit</button>
          <button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:none" onclick="rollbackListing('${esc(item.id)}','${esc(item.title)}')">Rollback</button>
          <button class="btn btn-danger btn-sm" onclick="deleteListingAdmin('${esc(item.id)}','${esc(item.title)}')">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="section-header">
      <h2>All Listings (${listings.length})</h2>
      <button class="btn btn-primary btn-sm" onclick="loadAllListings()">Refresh</button>
    </div>
    ${tabBar}
    <div class="card" style="overflow:auto;padding:0">
      <table class="tbl">
        <thead><tr>
          <th>Image</th><th>Title</th><th>Seller</th><th>Category</th>
          <th>Status</th><th>AI Decision</th><th>Confidence</th><th>Age</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function adminEditListing(listingId, modal) {
  const msgEl = modal.querySelector('#aedit-msg');
  msgEl.innerHTML = '';
  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  const titleVal = modal.querySelector('#aedit-title').value.trim();
  const catVal = modal.querySelector('#aedit-category').value;
  const descVal = modal.querySelector('#aedit-description').value.trim();
  const priceVal = modal.querySelector('#aedit-price').value;
  const directPublish = modal.querySelector('#aedit-publish').checked;
  const imageInput = modal.querySelector('#aedit-images');

  if (titleVal) fd.append('title', titleVal);
  if (catVal) fd.append('category', catVal);
  if (descVal) fd.append('description', descVal);
  if (priceVal) fd.append('price', priceVal);
  fd.append('direct_publish', directPublish ? 'true' : 'false');
  if (imageInput.files.length > 0) {
    for (const f of imageInput.files) fd.append('images', f);
  }

  try {
    const res = await fetch(`/api/listings/${encodeURIComponent(listingId)}/admin`, { method: 'PATCH', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Update failed');
    modal.remove();
    await loadAllListings();
  } catch (err) {
    msgEl.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

    if (!res.ok) { const t = await res.text(); throw new Error(`HTTP ${res.status}: ${t}`); }
    await loadAllListings();
  } catch (err) { alert(`Error: ${err.message}`); }
}

async function createUser(modal) {
  const msgEl = modal.querySelector('#cu-msg');
  msgEl.innerHTML = '';

  const password = modal.querySelector('#cu-password').value;
  const isAdmin = modal.querySelector('#cu-admin').checked;
  if (!username || !password) {

  }
  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  fd.append('username', username);
  fd.append('password', password);
  fd.append('is_admin', isAdmin ? 'true' : 'false');

    const res = await fetch('/api/users', { method: 'POST', body: fd });

    if (!res.ok) throw new Error(data.detail || 'Create failed');

    await loadUsers();

  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  fd.append('password', newPw.trim());
  try {
    const res = await fetch(`/api/users/${encodeURIComponent(username)}/password`, { method: 'PUT', body: fd });

    if (!res.ok) throw new Error(data.detail || 'Failed');
    alert(`Password updated for "${username}".`);
  } catch (err) { alert(`Error: ${err.message}`); }
}

async function deleteUser(username) {

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Delete failed');
    await loadUsers();
  } catch (err) { alert(`Error: ${err.message}`); }
}

      <div class="insight-card">
        <div class="insight-val">${data.total_moderated}</div>
        <div class="insight-label">Total Moderated</div>
      </div>
      <div class="insight-card">
        <div class="insight-val">${(data.queue_age || []).length}</div>
        <div class="insight-label">Pending in Queue</div>
      </div>
    </div>`;

  const catRows = (data.category_breakdown || []).map(c => {
    const vr = c.total > 0 ? ((c.rejected / c.total) * 100).toFixed(1) : '0.0';
    return `<tr>
      <td>${esc(c.category)}</td>
      <td style="text-align:center">${c.total}</td>
      <td style="text-align:center;color:var(--c-success)">${c.approved}</td>
      <td style="text-align:center;color:var(--c-danger)">${c.rejected}</td>
      <td style="text-align:center;color:var(--c-warning)">${c.review}</td>
      <td style="text-align:center">${vr}%</td>
    </tr>`;
  }).join('');

  const catTable = `
    <div class="card" style="padding:1.5rem;margin-bottom:2rem">
      <h3 style="margin-bottom:1rem;font-weight:700">Category Breakdown</h3>
      <div style="overflow:auto">
        <table class="tbl">
          <thead><tr><th>Category</th><th>Total</th><th>Approved</th><th>Rejected</th><th>Review</th><th>Violation %</th></tr></thead>
          <tbody>${catRows || '<tr><td colspan="6" style="text-align:center;color:var(--c-gray)">No data</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;

  const maxReasonCount = (data.reasons_frequency || []).reduce((m, r) => Math.max(m, r.count), 1);
  const reasonRows = (data.reasons_frequency || []).map(r => {
    const pct = Math.round((r.count / maxReasonCount) * 100);
    return `<tr>
      <td>${esc(r.reason)}</td>
      <td style="text-align:center">${r.count}</td>
      <td style="width:120px"><div style="background:#e2e8f0;border-radius:4px;height:8px"><div style="background:var(--c-danger);width:${pct}%;height:8px;border-radius:4px"></div></div></td>
    </tr>`;
  }).join('');

  const maxConfCount = (data.confidence_distribution || []).reduce((m, r) => Math.max(m, r.count), 1);
  const confRows = (data.confidence_distribution || []).map(r => {
    const pct = Math.round((r.count / maxConfCount) * 100);
    return `<tr>
      <td>${esc(r.band)}</td>
      <td style="text-align:center">${r.count}</td>
      <td style="width:120px"><div style="background:#e2e8f0;border-radius:4px;height:8px"><div style="background:var(--c-primary);width:${pct}%;height:8px;border-radius:4px"></div></div></td>
    </tr>`;
  }).join('');

  const detailCols = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem">
      <div class="card" style="padding:1.5rem">
        <h3 style="margin-bottom:1rem;font-weight:700">Top Flag Reasons</h3>
        <table class="tbl">
          <thead><tr><th>Reason</th><th>Count</th><th>Bar</th></tr></thead>
          <tbody>${reasonRows || '<tr><td colspan="3" style="text-align:center;color:var(--c-gray)">No data</td></tr>'}</tbody>
        </table>
      </div>
      <div class="card" style="padding:1.5rem">
        <h3 style="margin-bottom:1rem;font-weight:700">Confidence Distribution</h3>
        <table class="tbl">
          <thead><tr><th>Band</th><th>Count</th><th>Bar</th></tr></thead>
          <tbody>${confRows || '<tr><td colspan="3" style="text-align:center;color:var(--c-gray)">No data</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;

  let queueHtml = '';
  if ((data.queue_age || []).length > 0) {
    const qRows = data.queue_age.map(q => {
      const h = q.age_hours;
      const ageCls = h < 1 ? 'age-ok' : h < 4 ? 'age-warn' : 'age-crit';
      const hours = Math.floor(h);
      const mins = Math.round((h - hours) * 60);
      const ageStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
      return `<tr>
        <td style="max-width:200px">${esc(q.title.length > 40 ? q.title.slice(0,40)+'...' : q.title)}</td>
        <td>${esc(q.seller)}</td>
        <td><span class="priority-badge priority-${q.priority === 'high' ? 'high' : q.priority === 'normal' ? 'medium' : 'low'}">${esc(q.priority)}</span></td>
        <td><span class="age-badge ${ageCls}">${ageStr}</span></td>
      </tr>`;
    }).join('');
    queueHtml = `
      <div class="card" style="padding:1.5rem;margin-bottom:2rem">
        <h3 style="margin-bottom:1rem;font-weight:700">Queue Age</h3>
        <table class="tbl">
          <thead><tr><th>Title</th><th>Seller</th><th>Priority</th><th>Waiting</th></tr></thead>
          <tbody>${qRows}</tbody>
        </table>
      </div>`;
  }

  el.innerHTML = `
    <div class="section-header">
      <h2>Insights</h2>
      <button class="btn btn-primary btn-sm" onclick="loadInsights()">Refresh</button>
    </div>
    ${statCards}
    ${catTable}
    ${detailCols}
    ${queueHtml}`;
}

// ---------------------------------------------------------------------------
// System (admin)
// ---------------------------------------------------------------------------
async function loadSystem() {
  if (!currentUser || !currentUser.is_admin) return;
  const el = document.getElementById('system-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--c-gray)">Loading system info...</p></div>';
  try {
    const [sysRes, thrRes] = await Promise.all([
      fetch(`/api/health/system?moderator=${encodeURIComponent(currentUser.username)}`),
      fetch('/api/config/thresholds'),
    ]);
    if (!sysRes.ok) throw new Error('Failed to load system health');
    const sys = await sysRes.json();
    const thresholds = thrRes.ok ? await thrRes.json() : {};
    renderSystem(sys, thresholds);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

function renderSystem(sys, thresholds) {
  const el = document.getElementById('system-content');
  const m = sys.models || {};
  const modelDotCls = m.status === 'ok' ? 'dot-ok' : 'dot-err';
  const modelStatusTxt = m.status || 'unknown';

  const modelsHtml = `
    <div class="insight-card" style="margin-bottom:1.5rem">
      <h3 style="margin-bottom:1rem;font-weight:700"><span class="dot ${modelDotCls}"></span>Model Health &mdash; ${esc(modelStatusTxt)}</h3>
      <p style="color:var(--c-gray);font-size:.9rem;margin-bottom:.75rem">Ollama URL: <code>${esc(m.ollama_url || '--')}</code></p>
      <table class="tbl">
        <thead><tr><th>Model</th><th>Name</th><th>Status</th></tr></thead>
        <tbody>
          <tr>
            <td>Text</td>
            <td><code>${esc((m.text_model || {}).name || '--')}</code></td>
            <td>${(m.text_model || {}).available
              ? '<span class="status-badge status-approved" style="margin:0;font-size:.75rem">Available</span>'
              : '<span class="status-badge status-rejected" style="margin:0;font-size:.75rem">Unavailable</span>'}</td>
          </tr>
          <tr>
            <td>Vision</td>
            <td><code>${esc((m.vision_model || {}).name || '--')}</code></td>
            <td>${(m.vision_model || {}).available
              ? '<span class="status-badge status-approved" style="margin:0;font-size:.75rem">Available</span>'
              : '<span class="status-badge status-rejected" style="margin:0;font-size:.75rem">Unavailable</span>'}
              <span style="color:var(--c-gray);font-size:.75rem;margin-left:.5rem">(~6min avg)</span></td>
          </tr>
        </tbody>
      </table>
    </div>`;

  const thr = sys.thresholds || thresholds;
  const threshHtml = `
    <div class="insight-card" style="margin-bottom:1.5rem">
      <h3 style="margin-bottom:1rem;font-weight:700">Threshold Configuration</h3>
      <div id="thresh-msg" style="margin-bottom:.75rem"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1rem">
        <div class="form-group" style="margin:0">
          <label style="font-size:.85rem">Auto-Approve Confidence</label>
          <input id="thr-approve-conf" class="input" type="number" step="0.01" min="0" max="1" value="${esc(String(thr.auto_approve_confidence || ''))}">
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:.85rem">Auto-Approve Risk Max</label>
          <input id="thr-approve-risk" class="input" type="number" step="1" min="0" max="100" value="${esc(String(thr.auto_approve_risk_max || ''))}">
        </div>
        <div class="form-group" style="margin:0">
          <label style="font-size:.85rem">Auto-Reject Confidence</label>
          <input id="thr-reject-conf" class="input" type="number" step="0.01" min="0" max="1" value="${esc(String(thr.auto_reject_confidence || ''))}">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="updateThresholds()">Update Thresholds</button>
      <p style="color:var(--c-gray);font-size:.8rem;margin-top:.75rem">Changes take effect immediately, reset on restart.</p>
    </div>`;

  const db = sys.database || {};
  const dbStats = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem">
      ${statCard('Listings', db.listings || 0, 'var(--c-primary)')}
      ${statCard('Moderated', db.listing_moderation || 0, '#27ae60')}
      ${statCard('Queue Items', db.human_review_queue || 0, 'var(--c-warning)')}
      ${statCard('Publish Log', db.listing_publish_log || 0, '#7c3aed')}
    </div>`;

  const wh = sys.webhook || {};
  const webhookHtml = `
    <div class="insight-card" style="margin-bottom:1.5rem">
      <h3 style="margin-bottom:1rem;font-weight:700">Webhook Status</h3>
      <table class="tbl">
        <tbody>
          <tr><td style="font-weight:600">Configured</td><td>${wh.url_configured ? '<span style="color:var(--c-success)">Yes</span>' : 'No'}</td></tr>
          <tr><td style="font-weight:600">Last Sent</td><td>${esc(wh.last_sent_at || 'never')}</td></tr>
          <tr><td style="font-weight:600">Last Status</td><td>${esc(wh.last_status || '--')}</td></tr>
          ${wh.last_error ? `<tr><td style="font-weight:600">Last Error</td><td style="color:var(--c-danger);font-size:.85rem">${esc(wh.last_error)}</td></tr>` : ''}
        </tbody>
      </table>
    </div>`;

  const svc = sys.service || {};
  const svcHtml = `
    <div class="insight-card" style="margin-bottom:1.5rem">
      <h3 style="margin-bottom:1rem;font-weight:700">Service Info</h3>
      <table class="tbl">
        <tbody>
          <tr><td style="font-weight:600">Version</td><td>${esc(svc.version || '--')}</td></tr>
          <tr><td style="font-weight:600">Port</td><td>${esc(String(svc.port || '--'))}</td></tr>
        </tbody>
      </table>
    </div>`;

  el.innerHTML = `
    <div class="section-header">
      <h2>System</h2>
      <button class="btn btn-primary btn-sm" onclick="loadSystem()">Refresh</button>
    </div>
    ${modelsHtml}
    ${threshHtml}
    <h3 style="margin-bottom:1rem;font-weight:700">Pipeline Stats</h3>
    ${dbStats}
    ${webhookHtml}
    ${svcHtml}`;
}

async function updateThresholds() {
  const msgEl = document.getElementById('thresh-msg');
  if (msgEl) msgEl.innerHTML = '';
  const fd = new FormData();
  fd.append('moderator', currentUser.username);
  const ac = document.getElementById('thr-approve-conf').value;
  const ar = document.getElementById('thr-approve-risk').value;
  const rc = document.getElementById('thr-reject-conf').value;
  if (ac) fd.append('auto_approve_confidence', ac);
  if (ar) fd.append('auto_approve_risk_max', ar);
  if (rc) fd.append('auto_reject_confidence', rc);
  try {
    const res = await fetch('/api/config/thresholds', { method: 'PUT', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Update failed');
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-success">Thresholds updated successfully.</div>';
    setTimeout(() => loadSystem(), 1200);
  } catch (err) {
    if (msgEl) msgEl.innerHTML = `<div class="alert alert-error"><span>&#x26a0;&#xfe0f;</span> ${esc(err.message)}</div>`;
  }
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  catch { return ''; }
}

function fmtDateTime(iso) {
  try { return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return ''; }
}
